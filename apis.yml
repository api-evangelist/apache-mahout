aid: apache-mahout
name: Apache Mahout
description: >-
  Apache Mahout is an open-source framework for building scalable machine learning applications. The project has evolved to include Qumat, a unified Python API for building quantum circuits that runs across multiple quantum backends including Qiskit, Cirq, and Amazon Braket, along with QDP for GPU-accelerated classical-to-quantum data encoding.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Distributed Computing
  - Machine Learning
  - Python
  - Quantum Computing
  - Scala
created: '2026-03-16'
modified: '2026-04-19'
url: >-
  https://raw.githubusercontent.com/api-evangelist/apache-mahout/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: apache-mahout:qumat
    name: Qumat
    description: >-
      Qumat is a unified Python API for building and executing quantum circuits across multiple quantum computing backends including Qiskit, Cirq, and Amazon Braket. It provides a hardware-agnostic interface for quantum gate operations, parameterized circuits, measurement, and state vector retrieval.
    humanURL: https://mahout.apache.org/docs/qumat
    tags:
      - Python
      - Quantum Computing
      - Quantum Circuits
    properties:
      - type: Documentation
        url: https://mahout.apache.org/docs/qumat
      - type: APIReference
        url: https://mahout.apache.org/docs/qumat/api
      - type: GettingStarted
        url: https://mahout.apache.org/docs/qumat/getting-started
      - type: SDKs
        url: https://pypi.org/project/qumat/
        title: Python SDK (PyPI)
      - type: GitHubRepository
        url: https://github.com/apache/mahout
  - aid: apache-mahout:apache-mahout-samsara
    name: Apache Mahout Samsara
    description: >-
      Mahout Samsara is a distributed linear algebra DSL in Scala for building machine learning algorithms on Apache Spark. It provides matrix decompositions, collaborative filtering, clustering, and other algorithms as a mathematically expressive API.
    humanURL: https://mahout.apache.org/docs/latest/
    tags:
      - Distributed Computing
      - Linear Algebra
      - Machine Learning
      - Scala
      - Spark
    properties:
      - type: Documentation
        url: https://mahout.apache.org/docs/latest/
      - type: GitHubRepository
        url: https://github.com/apache/mahout
